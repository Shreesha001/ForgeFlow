name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forgeflow
          POSTGRES_PASSWORD: forgeflow
          POSTGRES_DB: forgeflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgeflow"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (race detector, integration included)
        env:
          FORGEFLOW_TEST_DATABASE_URL: postgres://forgeflow:forgeflow@localhost:5432/forgeflow_test?sslmode=disable
        run: go test -race -count=1 ./...
