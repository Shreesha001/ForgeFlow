# Full ForgeFlow cluster: Postgres + API/scheduler node + 3 workers.
# Try: docker compose up --build, then open http://localhost:8080
# Chaos test: docker compose kill worker-2  (its runs get recovered)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forgeflow
      POSTGRES_PASSWORD: forgeflow
      POSTGRES_DB: forgeflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeflow"]
      interval: 2s
      timeout: 2s
      retries: 15

  api:
    build: .
    command: ["api", "scheduler"]
    environment:
      FORGEFLOW_DATABASE_URL: postgres://forgeflow:forgeflow@postgres:5432/forgeflow?sslmode=disable
      FORGEFLOW_WORKER_ID: api-node
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker-1: &worker
    build: .
    command: ["worker", "scheduler"]   # scheduler on workers too: leader failover
    environment: &workerenv
      FORGEFLOW_DATABASE_URL: postgres://forgeflow:forgeflow@postgres:5432/forgeflow?sslmode=disable
      FORGEFLOW_WORKER_ID: worker-1
      FORGEFLOW_LEASE_DURATION: 15s
      FORGEFLOW_HEARTBEAT_INTERVAL: 5s
    depends_on:
      postgres:
        condition: service_healthy

  worker-2:
    <<: *worker
    environment:
      <<: *workerenv
      FORGEFLOW_WORKER_ID: worker-2

  worker-3:
    <<: *worker
    environment:
      <<: *workerenv
      FORGEFLOW_WORKER_ID: worker-3
